<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>AftOS Launcher</title>
    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }

        #loading-screen {
            text-align: center;
            opacity: 1;
            transition: opacity 1s;
        }

        #progress-bar {
            width: 300px;
            height: 20px;
            background-color: #333;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0;
            height: 100%;
            background-color: #00cc66;
            border-radius: 10px;
            transition: width 0.3s;
        }

        #guestBtn {
            background-color: black;
            color: white;
            border: none;
            font-size: 24px;
            padding: 20px 40px;
            cursor: pointer;
            margin-top: 40px;
            transition: background 0.3s;
            display: none;
        }

        #guestBtn:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <h1>Loading AftOS...</h1>
        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>

    <button id="guestBtn">Guest</button>

    <script>
        // Simulate loading
        const progressFill = document.getElementById("progress-fill");
        const loadingScreen = document.getElementById("loading-screen");
        const guestBtn = document.getElementById("guestBtn");

        let progress = 0;
        const loadingInterval = setInterval(() => {
            progress += Math.random() * 10;
            if (progress >= 100) {
                progress = 100;
                clearInterval(loadingInterval);
                loadingScreen.style.opacity = 0;
                setTimeout(() => {
                    loadingScreen.style.display = "none";
                    guestBtn.style.display = "block";
                }, 1000);
            }
            progressFill.style.width = `${progress}%`;
        }, 200);

        // Fullscreen and AftOS loading
        guestBtn.addEventListener("click", () => {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.mozRequestFullScreen) {
                elem.mozRequestFullScreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }

            // Replace this page content with your AftOS
            document.body.innerHTML = `
                <div id="taskbar">
                    <button id="notepadBtn">📝 Notepad</button>
                    <button id="calculatorBtn">🧮 Calculator</button>
                    <button id="browserBtn">🌐 Browser</button>
                </div>
                <div id="desktop"></div>
            `;

            const desktop = document.getElementById("desktop");

            // Add event listeners for the taskbar buttons
            document.getElementById("notepadBtn").addEventListener("click", () => openApp("notepad"));
            document.getElementById("calculatorBtn").addEventListener("click", () => openApp("calculator"));
            document.getElementById("browserBtn").addEventListener("click", () => openApp("browser"));

            function openApp(app) {
                const win = document.createElement("div");
                win.className = "window";
                const title = app[0].toUpperCase() + app.slice(1);
                let content = "";

                if (app === "notepad") {
                    content = `<textarea placeholder="Start typing..."></textarea>`;
                } else if (app === "calculator") {
                    const buttons = "123+456-789*0C=".split("").map(c => 
                        `<button onclick="calcButton('${c}')">${c}</button>`
                    ).join("");
                    content = `<input id="calc-display" readonly /><div>${buttons}</div>`;
                } else if (app === "browser") {
                    content = `
                        <input type="text" placeholder="https://example.com" onkeydown="if(event.key==='Enter') loadIframe(this)">
                        <iframe src="https://example.com"></iframe>
                    `;
                }

                win.innerHTML = `
                    <div class="window-header">
                        <span>${title}</span>
                        <button onclick="this.closest('.window').remove()">✖</button>
                    </div>
                    <div class="window-body">${content}</div>
                `;
                desktop.appendChild(win);
                makeDraggable(win);
            }

            function makeDraggable(win) {
                const header = win.querySelector(".window-header");
                header.onmousedown = e => {
                    const offsetX = e.clientX - win.offsetLeft;
                    const offsetY = e.clientY - win.offsetTop;
                    document.onmousemove = e => {
                        win.style.left = `${e.clientX - offsetX}px`;
                        win.style.top = `${e.clientY - offsetY}px`;
                    };
                    document.onmouseup = () => (document.onmousemove = document.onmouseup = null);
                };
            }

            function calcButton(c) {
                const d = document.getElementById("calc-display");
                if (!d) return;
                if (c === "C") d.value = "";
                else if (c === "=") {
                    try { d.value = eval(d.value); }
                    catch { d.value = "Error"; }
                } else d.value += c;
            }

            function loadIframe(input) {
                let url = input.value.trim();
                if (!url.startsWith("http")) url = "https://" + url;
                input.nextElementSibling.src = url;
            }
        });
    </script>
</body>
</html>
