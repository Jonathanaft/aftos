<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>AftOS</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background-color: black;
            background-image: radial-gradient(circle at 1px 1px, #444 1px, transparent 2px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start-button {
            background-color: #555;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 10px;
            transition: background-color 0.3s;
            z-index: 1000;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #start-button:hover {
            background-color: #777;
        }

        #taskbar {
            background-color: #333;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            gap: 10px;
            z-index: 1000;
            display: none;
        }

        #desktop {
            height: calc(100vh - 60px);
            position: relative;
            overflow: hidden;
            display: none;
        }

        .window {
            background: #444;
            border: 1px solid #666;
            position: absolute;
            width: 400px;
            height: 300px;
            top: 50px;
            left: 50px;
            display: flex;
            flex-direction: column;
            resize: both;
            overflow: hidden;
            z-index: 10;
        }

        .window-header {
            background: #222;
            padding: 5px;
            cursor: move;
            display: flex;
            justify-content: space-between;
            color: #fff;
        }

        .window-body {
            flex: 1;
            background: #111;
            padding: 10px;
            overflow: auto;
        }

        textarea, input[type="text"] {
            width: 100%;
            background: #222;
            color: white;
            border: none;
            box-sizing: border-box;
        }

        input[type="text"] {
            font-size: 18px;
            margin-bottom: 5px;
        }

        button {
            margin: 2px;
            background: #555;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #777;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <button id="start-button">I aren't a robot.</button>
    <div id="taskbar">
        <button id="notepadBtn">📝 Notepad</button>
        <button id="calculatorBtn">🧮 Calculator</button>
        <button id="browserBtn">🌐 Browser</button>
    </div>
    <div id="desktop"></div>

    <script>
        document.getElementById("start-button").addEventListener("click", () => {
            const elem = document.documentElement;
            (elem.requestFullscreen || elem.mozRequestFullScreen || elem.webkitRequestFullscreen || elem.msRequestFullscreen).call(elem);
            document.getElementById("start-button").style.display = "none";
            document.getElementById("taskbar").style.display = "flex";
            document.getElementById("desktop").style.display = "block";
        });

        // Add event listeners for buttons after the DOM content has loaded
        document.getElementById("notepadBtn").addEventListener("click", () => openApp("notepad"));
        document.getElementById("calculatorBtn").addEventListener("click", () => openApp("calculator"));
        document.getElementById("browserBtn").addEventListener("click", () => openApp("browser"));

        function openApp(app) {
            const win = document.createElement("div");
            win.className = "window";
            const title = app[0].toUpperCase() + app.slice(1);
            let content = "";

            if (app === "notepad") {
                content = `<textarea placeholder="Start typing..."></textarea>`;
            } else if (app === "calculator") {
                const buttons = "123+456-789*0C=".split("").map(c => 
                    `<button onclick="calcButton('${c}')">${c}</button>`
                ).join("");
                content = `<input id="calc-display" readonly /><div>${buttons}</div>`;
            } else if (app === "browser") {
                content = `
                    <input type="text" placeholder="https://example.com" onkeydown="if(event.key==='Enter') loadIframe(this)">
                    <iframe src="https://example.com"></iframe>
                `;
            }

            win.innerHTML = `
                <div class="window-header">
                    <span>${title}</span>
                    <button onclick="this.closest('.window').remove()">✖</button>
                </div>
                <div class="window-body">${content}</div>
            `;
            document.getElementById("desktop").appendChild(win);
            makeDraggable(win);
        }

        function makeDraggable(win) {
            const header = win.querySelector(".window-header");
            header.onmousedown = e => {
                const offsetX = e.clientX - win.offsetLeft;
                const offsetY = e.clientY - win.offsetTop;
                document.onmousemove = e => {
                    win.style.left = `${e.clientX - offsetX}px`;
                    win.style.top = `${e.clientY - offsetY}px`;
                };
                document.onmouseup = () => (document.onmousemove = document.onmouseup = null);
            };
        }

        function calcButton(c) {
            const d = document.getElementById("calc-display");
            if (!d) return;
            if (c === "C") d.value = "";
            else if (c === "=") {
                try { d.value = eval(d.value); }
                catch { d.value = "Error"; }
            } else d.value += c;
        }

        function loadIframe(input) {
            let url = input.value.trim();
            if (!url.startsWith("http")) url = "https://" + url;
            input.nextElementSibling.src = url;
        }
    </script>
</body>
</html>
